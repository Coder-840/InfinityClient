name: InfinityClient
on: [workflow_dispatch] # Allows you to click a button to start the build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download Large Source
        # Replace the URL below with your actual direct link
        run: curl -L -o source.zip "https://www.filemail.com/d/sissqhlrupvreqf"

      - name: Extract Source
        run: unzip source.zip -d .

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Eaglercraft
        run: |
          chmod +x gradlew
          ./gradlew clean build

      - name: Upload HTML Result
        uses: actions/upload-artifact@v4
        with:
          name: Eaglercraft-HTML
          path: "**/build/distributions/*.zip"
